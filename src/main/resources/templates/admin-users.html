<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Panel Admina - Użytkownicy</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/library.css}">
    <link rel="stylesheet" th:href="@{/css/playlist-card.css}">
    <link rel="stylesheet" th:href="@{/css/admin-panel.css}">
</head>
<body>
    <nav class="navbar">
        <a th:href="@{/}" class="logo">Playzy</a>
        <div class="nav-links">
            <a th:href="@{/admin/users}" class="nav-btn active-link">Panel Admina</a>
            <a th:href="@{/dashboard}" class="nav-btn">Mój Profil</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="nav-btn primary">Wyloguj</button>
            </form>
        </div>
    </nav>

    <div class="container page-container admin-page-container">
        <div class="page-header">
            <h2>Panel Admina</h2>
        </div>

        <div class="tabs-container">
            <a th:href="@{/admin/users}" class="tab-btn active">Użytkownicy</a>
            <a th:href="@{/admin/playlists}" class="tab-btn">Wszystkie Playlisty</a>
        </div>

        <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}">Błąd</div>

        <form th:action="@{/admin/users}" method="get" class="admin-search-form">
            <input type="text" name="q" placeholder="Szukaj po nazwie użytkownika" th:value="${searchQuery}">
            <button type="submit" class="btn-outline active">Szukaj</button>
            <a th:if="${searchQuery != null and !searchQuery.isBlank()}" th:href="@{/admin/users}" class="btn-outline admin-link-btn">Wyczyść</a>
        </form>

        <p class="empty-state" th:if="${#lists.isEmpty(users)}">Brak użytkowników do wyświetlenia.</p>
        <div class="admin-list" th:unless="${#lists.isEmpty(users)}">
            <div class="admin-user-row" th:each="user : ${users}">
                <div class="admin-user-info">
                    <div class="playlist-title-row">
                        <span class="playlist-card-title" th:text="${user.username}">username</span>
                        <span class="playlist-badge" th:text="${user.role}">USER</span>
                    </div>
                    <div class="playlist-meta">
                        <span th:text="${user.email}">email@example.com</span>
                        <span th:text="'Dołączył: ' + ${#temporals.format(user.joinDate, 'dd-MM-yyyy HH:mm')}">Data</span>
                    </div>
                </div>
                <div class="playlist-actions" th:if="${user.role.name() != 'ADMIN'}">
                    <button type="button" class="nav-btn admin-edit-btn"
                            th:data-user-id="${user.id}"
                            th:data-username="${user.username}"
                            th:data-email="${user.email}"
                            th:data-role="${user.role.name()}"
                            onclick="openEditUserModal(this)">✏️ Edytuj</button>
                    <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" onsubmit="return confirm('Czy na pewno chcesz usunąć tego użytkownika?');">
                        <button type="submit" class="btn-delete" th:disabled="${currentUser != null and user.id == currentUser.id}">🗑️ Usuń</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="editUserModal" class="modal" th:classappend="${editUserModalOpen} ? 'show' : ''">
        <div class="modal-content">
            <span class="close-btn" onclick="closeEditUserModal()">&times;</span>
            <h3 class="modal-form-title">Edytuj użytkownika</h3>
            <div class="alert alert-error" th:if="${editUserError}" th:text="${editUserError}">Błąd</div>
            <form id="editUserForm" method="post" th:action="${editUserId != null ? '/admin/users/' + editUserId + '/update' : '#'}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-group">
                    <label for="editUsername">Nazwa użytkownika</label>
                    <input type="text" id="editUsername" name="username" minlength="3" maxlength="50" pattern="^[a-zA-Z0-9_-]+$" th:value="${editUsername}" required>
                </div>

                <div class="form-group">
                    <label for="editEmail">Email</label>
                    <input type="email" id="editEmail" name="email" pattern="^[A-Za-z0-9+_.-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,20}$" th:value="${editEmail}" required>
                </div>

                <div class="form-group">
                    <input type="hidden" id="editModerator" name="moderator" th:value="${editModerator == true} ? 'true' : 'false'">
                    <button type="button" id="editModeratorButton" class="btn-outline admin-modal-role-btn" th:classappend="${editModerator == true} ? '' : 'active'" th:text="${editModerator == true} ? 'Usuń rolę moderatora' : 'Nadaj rolę moderatora'" onclick="toggleEditModerator()">Nadaj rolę moderatora</button>
                </div>

                <button type="submit" class="modal-submit-btn">Zapisz zmiany</button>
            </form>
        </div>
    </div>

    <script>
        function openEditUserModal(button) {
            const modal = document.getElementById('editUserModal');
            const form = document.getElementById('editUserForm');
            const moderatorInput = document.getElementById('editModerator');
            const moderatorButton = document.getElementById('editModeratorButton');

            form.action = `/admin/users/${button.dataset.userId}/update`;
            document.getElementById('editUsername').value = button.dataset.username;
            document.getElementById('editEmail').value = button.dataset.email;

            const isModerator = button.dataset.role === 'MODERATOR';
            moderatorInput.value = isModerator ? 'true' : 'false';
            moderatorButton.classList.toggle('active', !isModerator);
            moderatorButton.innerText = isModerator ? 'Usuń rolę moderatora' : 'Nadaj rolę moderatora';

            modal.classList.add('show');
        }

        function closeEditUserModal() {
            document.getElementById('editUserModal').classList.remove('show');
        }

        function toggleEditModerator() {
            const moderatorInput = document.getElementById('editModerator');
            const moderatorButton = document.getElementById('editModeratorButton');
            const isModerator = moderatorInput.value === 'true';

            moderatorInput.value = isModerator ? 'false' : 'true';
            moderatorButton.classList.toggle('active', isModerator);
            moderatorButton.innerText = isModerator ? 'Nadaj rolę moderatora' : 'Usuń rolę moderatora';
        }

        window.addEventListener('click', function(event) {
            const modal = document.getElementById('editUserModal');
            if (event.target === modal) {
                closeEditUserModal();
            }
        });
    </script>
</body>
</html>
