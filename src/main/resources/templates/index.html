<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Playzy - Odkrywaj i Twórz Playlisty</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <a th:href="@{/}" class="logo">Playzy</a>
        <div class="nav-links">
            <th:block sec:authorize="isAnonymous()">
                <a th:href="@{/login}" class="nav-btn">Zaloguj się</a>
                <a th:href="@{/register}" class="nav-btn primary">Dołącz za darmo</a>
            </th:block>
            <th:block sec:authorize="isAuthenticated()">
                <a th:href="@{/dashboard}" class="nav-btn">Mój Panel</a>
                <form th:action="@{/logout}" method="post" style="display:inline; margin:0;">
                    <button type="submit" class="nav-btn primary" style="width: auto; padding: 0.6rem 1.2rem; font-size: inherit; margin:0;">Wyloguj</button>
                </form>
            </th:block>
        </div>
    </nav>

    <main class="hero">
        <h1>Poczuj Rytm z Playzy</h1>
        <p>Najlepsze miejsce do tworzenia, udostępniania i odkrywania publicznych playlist. Zbierz swoje ulubione utwory w jednym miejscu i podziel się nimi ze światem.</p>
        
        <div sec:authorize="isAnonymous()" style="display: flex; gap: 1rem; justify-content: center;">
            <a th:href="@{/register}" style="text-decoration: none;"><button style="width: auto; padding: 1rem 2rem; font-size: 1.1rem;">Zacznij Tworzyć</button></a>
        </div>
        <div sec:authorize="isAuthenticated()" style="display: flex; gap: 1rem; justify-content: center;">
            <a th:href="@{/dashboard}" style="text-decoration: none;"><button style="width: auto; padding: 1rem 2rem; font-size: 1.1rem;">Przejdź do panelu</button></a>
        </div>
    </main>
</body>
</html>
