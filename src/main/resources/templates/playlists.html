<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Publiczne Playlisty - Playzy</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <a th:href="@{/}" class="logo">Playzy</a>
        <div class="nav-links">
            <a th:href="@{/playlists}" class="nav-btn active-link">Publiczne Playlisty</a>
            <th:block sec:authorize="isAnonymous()">
                <a th:href="@{/login}" class="nav-btn">Zaloguj się</a>
                <a th:href="@{/register}" class="nav-btn primary">Dołącz za darmo</a>
            </th:block>
            <th:block sec:authorize="isAuthenticated()">
                <a th:href="@{/library}" class="nav-btn">Biblioteka</a>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="nav-btn primary">Wyloguj</button>
                </form>
            </th:block>
        </div>
    </nav>

    <div class="container page-container">
        <h2>Publiczne Playlisty</h2>
        <p class="empty-state">Brak publicznych playlist do wyświetlenia.</p>
    </div>
</body>
</html>
