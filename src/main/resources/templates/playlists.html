<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Publiczne Playlisty - Playzy</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <a th:href="@{/}" class="logo">Playzy</a>
        <div class="nav-links">
            <a th:href="@{/playlists}" class="nav-btn active-link">Publiczne Playlisty</a>
            <th:block sec:authorize="isAnonymous()">
                <a th:href="@{/login}" class="nav-btn">Zaloguj się</a>
                <a th:href="@{/register}" class="nav-btn primary">Dołącz za darmo</a>
            </th:block>
            <th:block sec:authorize="isAuthenticated()">
                <a th:href="@{/library}" class="nav-btn">Biblioteka</a>
                <a th:href="@{/dashboard}" class="nav-btn">Mój Panel</a>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="nav-btn primary">Wyloguj</button>
                </form>
            </th:block>
        </div>
    </nav>

    <div class="container page-container">
        <h2>Publiczne Playlisty</h2>
        <p class="empty-state" th:if="${#lists.isEmpty(publicPlaylists)}">Brak publicznych playlist do wyświetlenia.</p>
        <div class="playlists-container" th:unless="${#lists.isEmpty(publicPlaylists)}">
            <div class="playlist-card" th:each="playlist : ${publicPlaylists}">
                <div class="playlist-img-placeholder">🎵</div>
                <div class="playlist-info">
                    <div class="playlist-title-row">
                        <span class="playlist-card-title" th:text="${playlist.name}">Tytuł</span>
                        <span class="playlist-badge" th:text="${playlist.public ? 'Publiczna' : 'Prywatna'}">Status</span>
                    </div>
                    <div class="playlist-meta">
                        <span class="playlist-card-author" th:text="'Autor: ' + ${playlist.owner.username}">Autor</span>
                        <span th:text="${#lists.size(playlist.tracks)} + ' utworów'">0 utworów</span>
                    </div>
                </div>
                <div class="playlist-actions">
                    <div class="playlist-stats">
                        <button class="btn-icon">👍 <span th:text="${playlist.likesCount}">0</span></button>
                        <button class="btn-icon">👎 <span th:text="${playlist.dislikesCount}">0</span></button>
                    </div>
                    <span th:if="${#authorization.expression('isAuthenticated()') and #authentication.name == playlist.owner.username}" class="playlist-badge" style="background-color: var(--accent-primary); color: white;">Twoja playlista</span>
                    <button th:unless="${#authorization.expression('isAuthenticated()') and #authentication.name == playlist.owner.username}" class="btn-outline">Obserwuj</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
