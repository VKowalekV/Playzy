<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Playzy - Publiczne Playlisty</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/playlists.css}">
    <link rel="stylesheet" th:href="@{/css/playlist-card.css}">
</head>
<body>
    <nav class="navbar">
        <a th:href="@{/}" class="logo">Playzy</a>
        <div class="nav-links">
            <a sec:authorize="!hasRole('ADMIN')" th:href="@{/playlists}" class="nav-btn active-link">Publiczne Playlisty</a>
            <th:block sec:authorize="isAnonymous()">
                <a th:href="@{/login}" class="nav-btn">Zaloguj się</a>
                <a th:href="@{/register}" class="nav-btn primary">Dołącz za darmo</a>
            </th:block>
            <th:block sec:authorize="isAuthenticated()">
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/users}" class="nav-btn">Panel Admina</a>
                <a sec:authorize="!hasRole('ADMIN')" th:href="@{/library}" class="nav-btn">Biblioteka</a>
                <a sec:authorize="hasRole('MODERATOR')" th:href="@{/moderator/playlists}" class="nav-btn">Panel Moderatora</a>
                <a th:href="@{/dashboard}" class="nav-btn">Mój Profil</a>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="nav-btn primary">Wyloguj</button>
                </form>
            </th:block>
        </div>
    </nav>

    <div class="container page-container">
        <h2>Publiczne Playlisty</h2>

        <form th:action="@{/playlists}" method="get" class="filter-bar" id="filterForm">
            <div class="filter-group">
                <label for="sortField">Sortuj według</label>
                <select name="sortField" id="sortField" onchange="document.getElementById('filterForm').submit();">
                    <option value="createdAt" th:selected="${sortField == 'createdAt'}">Data dodania</option>
                    <option value="likesCount" th:selected="${sortField == 'likesCount'}">Liczba polubień</option>
                    <option value="dislikesCount" th:selected="${sortField == 'dislikesCount'}">Liczba dislików</option>
                    <option value="followersCount" th:selected="${sortField == 'followersCount'}">Liczba obserwujących</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="sortDir">Kierunek</label>
                <select name="sortDir" id="sortDir" onchange="document.getElementById('filterForm').submit();">
                    <option value="desc" th:selected="${sortDir == 'desc'}">Malejąco</option>
                    <option value="asc" th:selected="${sortDir == 'asc'}">Rosnąco</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="dateFilter">Czas</label>
                <select name="dateFilter" id="dateFilter" onchange="document.getElementById('filterForm').submit();">
                    <option value="all" th:selected="${dateFilter == 'all'}">Wszystko</option>
                    <option value="day" th:selected="${dateFilter == 'day'}">Ostatnie 24h</option>
                    <option value="week" th:selected="${dateFilter == 'week'}">Ostatni tydzień</option>
                    <option value="month" th:selected="${dateFilter == 'month'}">Ostatni miesiąc</option>
                </select>
            </div>
            <div class="filter-group filter-author">
                <label for="ownerUsername">Autor</label>
                <div class="filter-search">
                    <input type="text" name="ownerUsername" id="ownerUsername" th:value="${ownerUsername}" placeholder="Nazwa użytkownika...">
                    <button class="nav-btn primary" type="submit">Filtruj</button>
                </div>
            </div>
        </form>

        <p class="empty-state" th:if="${#lists.isEmpty(publicPlaylists)}">Brak publicznych playlist do wyświetlenia.</p>
        <div class="playlists-container" th:unless="${#lists.isEmpty(publicPlaylists)}">
            <div class="playlist-card" th:each="playlist : ${publicPlaylists}" th:onclick="'goToPlaylist(event, ' + ${playlist.id} + ')'">
                <div class="playlist-img-placeholder">🎵</div>
                <div class="playlist-info">
                    <div class="playlist-title-row">
                        <span class="playlist-card-title" th:text="${playlist.name}">Tytuł</span>
                        <span class="playlist-badge" th:text="${playlist.public ? 'Publiczna' : 'Prywatna'}">Status</span>
                    </div>
                    <div class="playlist-meta">
                        <span class="playlist-card-author" th:text="'Autor: ' + ${playlist.owner.username}">Autor</span>
                        <span th:text="${#lists.size(playlist.tracks)} + ' utworów'">0 utworów</span>
                    </div>
                </div>
                <div class="playlist-actions">
                    <div class="playlist-stats" sec:authorize="isAuthenticated()">
                        <button th:id="'like-btn-' + ${playlist.id}" type="button" class="btn-icon" th:classappend="${playlist.getUserRating(currentUser) != null and playlist.getUserRating(currentUser)} ? 'active' : ''" th:onclick="'ratePlaylist(event, ' + ${playlist.id} + ', true)'">
                            👍 <span th:id="'likes-count-' + ${playlist.id}" th:text="${playlist.likesCount}">0</span>
                        </button>
                        <button th:id="'dislike-btn-' + ${playlist.id}" type="button" class="btn-icon" th:classappend="${playlist.getUserRating(currentUser) != null and !playlist.getUserRating(currentUser)} ? 'active' : ''" th:onclick="'ratePlaylist(event, ' + ${playlist.id} + ', false)'">
                            👎 <span th:id="'dislikes-count-' + ${playlist.id}" th:text="${playlist.dislikesCount}">0</span>
                        </button>
                    </div>
                    <div class="playlist-stats" sec:authorize="isAnonymous()">
                        <button class="btn-icon" onclick="window.location.href='/login'">👍 <span th:id="'likes-count-' + ${playlist.id}" th:text="${playlist.likesCount}">0</span></button>
                        <button class="btn-icon" onclick="window.location.href='/login'">👎 <span th:id="'dislikes-count-' + ${playlist.id}" th:text="${playlist.dislikesCount}">0</span></button>
                    </div>
                    <span th:if="${#authorization.expression('isAuthenticated()') and #authentication.name == playlist.owner.username}" class="playlist-badge playlist-badge-owned">Twoja playlista</span>
                    <button th:id="'follow-btn-' + ${playlist.id}" type="button" th:if="${#authorization.expression('isAuthenticated()') and #authentication.name != playlist.owner.username}" class="btn-outline" th:classappend="${!playlist.isFollowedBy(currentUser)} ? 'active' : ''" th:text="${playlist.isFollowedBy(currentUser)} ? 'Odobserwuj' : 'Obserwuj'" th:onclick="'toggleFollow(event, ' + ${playlist.id} + ')'">Obserwuj</button>
                    <button th:unless="${#authorization.expression('isAuthenticated()')}" class="btn-outline active" onclick="window.location.href='/login'">Obserwuj</button>
                </div>
            </div>
        </div>
    </div>
    <script th:src="@{/js/playlists.js}"></script>
</body>
</html>
