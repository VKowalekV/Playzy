<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Logowanie - Playzy</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h1>Logowanie</h1>

    <div th:if="${param.error}" class="alert alert-error">
        Nieprawidłowy login lub hasło.
    </div>
    <div th:if="${param.logout}" class="alert alert-success">
        Zostałeś pomyślnie wylogowany.
    </div>
    <div th:if="${param.registered}" class="alert alert-success">
        Konto zostało utworzone. Możesz się teraz zalogować.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label for="username">Nazwa użytkownika lub Email:</label>
            <input type="text" id="username" name="username" th:value="${session.SPRING_SECURITY_LAST_USERNAME}" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Hasło:</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit">Zaloguj się</button>
    </form>

    <div class="links">
        <p>Nie masz konta? <a th:href="@{/register}">Zarejestruj się</a></p>
        <p><a th:href="@{/}">Wróć na stronę główną</a></p>
    </div>
</div>
</body>
</html>
