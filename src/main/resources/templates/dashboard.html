<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Playzy - Mój Panel</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
    <nav class="navbar">
        <a th:href="@{/}" class="logo">Playzy</a>
        <div class="nav-links">
            <a th:href="@{/playlists}" class="nav-btn">Publiczne Playlisty</a>
            <a th:href="@{/library}" class="nav-btn">Biblioteka</a>
            <span class="user-greeting">Witaj, <strong sec:authentication="name"></strong></span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="nav-btn primary">Wyloguj</button>
            </form>
        </div>
    </nav>

    <div class="dashboard-card">
        <h2>Panel Użytkownika</h2>
        
        <div class="user-info" th:if="${currentUser != null}">
            <p><strong>Nazwa użytkownika:</strong> <span th:text="${currentUser.username}"></span></p>
            <p><strong>Email:</strong> <span th:text="${currentUser.email}"></span></p>
            <p><strong>Data dołączenia:</strong> <span th:text="${#temporals.format(currentUser.joinDate, 'dd-MM-yyyy HH:mm')}"></span></p>
        </div>
    </div>
</body>
</html>
